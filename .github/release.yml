changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - "*.github-actions[bot]"
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 🧰 Maintenance
      labels:
        - maintenance
        - chore
        - dependencies
    - title: Documentation
      labels:
        - documentation
        - docs
