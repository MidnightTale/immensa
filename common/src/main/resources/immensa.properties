# Terrain Diffusion MC configuration

# Inference device: "cpu", "gpu", or "auto" (try GPU first then fall back to CPU).
# The universal jar selects DirectML on Windows and CUDA on Linux, then uses
# CPU if the platform GPU provider is unavailable.
inference.device=auto

# Offload inactive models from VRAM so only one model occupies the GPU at a time.
# Keeps peak VRAM to 1.5-2 GB. Set to false if you have ~2.5+ GB of free VRAM for
# much faster generation (avoids multi-second session reloads between stages).
inference.offload_models=true

# Validate SHA-256 for pre-existing files in .minecraft/immensa-models.
# Set to false to allow custom user-provided models/config without hash checks.
validate_model=true

# Port for the local terrain explorer web UI (started with /immensa-explore command).
explorer.port=19801

# Terrain generation region side length in blocks. Must be a power of 2.
# Examples: 128, 256, 512, 1024.
# Use larger values to generate in larger batches (more chunks per second)
# Use smaller values to generate in smaller batches (most responsive)
tile_size=256

# Climate-aware hydrology post-process. Rivers use padded drainage context, merge
# downstream, receive extra glacier runoff, and lose water in arid biomes.
hydrology.enabled=true
hydrology.context_padding=128
# Only persistent drainage basins become visible rivers. Larger values produce
# fewer tributaries and reserve water for substantial main channels.
hydrology.min_catchment_km2=8.0
# Compensate for the larger real-world area visible per block at scale 1.
hydrology.scale_density=true
# Changes visible bankfull width without adding more river networks. Ordinary
# rivers now form broad 12-32 block channels instead of narrow streams.
hydrology.river_width_multiplier=2.15
hydrology.normal_river_min_width_blocks=12
hydrology.normal_river_max_width_blocks=32
# Rare ocean-bound basin trunks become a separate great-river class. They ramp
# smoothly from ordinary channels into navigable 64-120 block wide waterways.
hydrology.great_rivers=true
hydrology.great_river_catchment_multiplier=6.0
hydrology.great_river_min_width_blocks=64
hydrology.great_river_max_width_blocks=120
# Reject small terrain depressions so the landscape is not covered in puddles.
hydrology.min_lake_area_km2=0.12
# Hard safety bound from issue #27. Values above 300 are clamped to 300.
hydrology.max_lake_depth_m=300.0
# Reserved for a future live lake simulation. This is intentionally not baked
# during chunk generation because transient rain produced permanent tile seams.
hydrology.rain_lake_rise_blocks=1

# Polar water freezes into world-seeded shore-fast ice, polygonal pack-ice
# plates and scattered floes with open navigable leads.
polar_ice.enabled=true
polar_ice.frozen_ocean_coverage=0.86
polar_ice.cold_ocean_coverage=0.34
polar_ice.max_thickness_blocks=3
# Pack ice fragments and fades into open water before this approximate depth.
polar_ice.offshore_reach_meters=850

# Geological stone/deepslate contact. This replaces Minecraft's flat Y=0..8
# transition with broad provinces, folds and a noisy mixed boundary.
geology.dynamic_strata=true
geology.strata_relief_blocks=28
geology.strata_blend_blocks=10

# Projecting shelves and shallow undercuts appear only on genuinely steep faces.
terrain.cliff_overhangs=true
terrain.cliff_overhang_strength=1.0

# Multi-scale density caves: large chambers, winding tunnel networks, and sparse
# natural surface openings. Vanilla ravines/carvers continue to add local variety.
caves.enabled=true
# 1.0 is balanced. Higher values make underground voids more common, not larger.
caves.abundance=1.0
caves.tunnels=true
caves.massive_caverns=true
caves.surface_entrances=true
# Keep oceans and surface hydrology, but drain the blanket water/lava fill from
# underground voids. Later biome features may still create small natural pools.
caves.drain_base_fluids=true
# Reintroduce selected groundwater and magma basins on actual cavern floors.
# Pools use fixed regional levels and never flood entire tunnel networks.
caves.pools=true
# Retain rare irregular lava basins near bedrock instead of a global lava ocean.
caves.deep_lava_pools=true

# CPU work is pipelined with serialized GPU inference. 0 is not valid; the default
# is half the available processors (minimum 2, maximum 32).
# performance.postprocess_threads=8
performance.inference_queue_size=32
performance.cache_tiles=96
# Finished terrain tiles are compressed to disk and reused across sessions.
performance.persistent_tile_cache=true
# Predict only one neighboring ring and stop whenever visible generation is busy.
performance.prefetch_radius=1
performance.prefetch_queue_limit=4

# Spawn search: coarse-pixel region sizes for land detection near (0,0).
# Starts at initial_size x initial_size, expands by 8 each iteration up to max_size x max_size.
spawn_search.initial_size=16
spawn_search.max_size=128
